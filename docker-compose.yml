services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: goodnews
      POSTGRES_PASSWORD: goodnews
      POSTGRES_DB: goodnews
    volumes:
      - goodnews_pg:/var/lib/postgresql/data

volumes:
  goodnews_pg:
