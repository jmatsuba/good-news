test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# DigitalOcean Spaces (S3-compatible). Keys: Account → API → Spaces keys.
# https://docs.digitalocean.com/products/spaces/how-to/use-aws-sdks/
# Env: SPACES_ACCESS_KEY_ID, SPACES_SECRET_ACCESS_KEY, SPACES_REGION, SPACES_BUCKET
# Optional: SPACES_ENDPOINT (default https://<SPACES_REGION>.digitaloceanspaces.com)
digitalocean:
  service: S3
  access_key_id: <%= ENV["SPACES_ACCESS_KEY"] %>
  secret_access_key: <%= ENV["SPACES_SECRET_KEY"] %>
  region: "tor1"
  bucket: "goodnews"
  endpoint: "https://tor1.digitaloceanspaces.com"

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

