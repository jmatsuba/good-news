# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  url: <%= ENV["DATABASE_URL"].presence || "postgresql://#{ENV.fetch("USER", "postgres")}@127.0.0.1:5432/goodnews" %>

  # Schema search path. The server defaults to $user,public
  #schema_search_path: myapp,sharedapp,public

  # Minimum log levels, in increasing order:
  #   debug5, debug4, debug3, debug2, debug1,
  #   log, notice, warning, error, fatal, and panic
  # Defaults to warning.
  #min_messages: notice

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  url: <%= ENV["DATABASE_URL_TEST"].presence || "postgresql://#{ENV.fetch("USER", "postgres")}@127.0.0.1:5432/goodnews_test" %>

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Connection URLs for non-primary databases can also be configured using
# environment variables. The variable name is formed by concatenating the
# connection name with `_DATABASE_URL`. For example:
#
#   CACHE_DATABASE_URL="postgres://cacheuser:cachepass@localhost/cachedatabase"
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
# Dokku: link separate postgres services (e.g. aqua / black / blue) so the
# server sets DOKKU_POSTGRES_*_URL. Optional fallbacks match Rails multi-db names.
<%
  dokku_cache_url = ENV["DOKKU_POSTGRES_AQUA_URL"].presence || ENV["CACHE_DATABASE_URL"].presence
  dokku_queue_url = ENV["DOKKU_POSTGRES_BLACK_URL"].presence || ENV["QUEUE_DATABASE_URL"].presence
  dokku_cable_url = ENV["DOKKU_POSTGRES_BLUE_URL"].presence || ENV["CABLE_DATABASE_URL"].presence
%>
production:
  primary: &primary_production
    <<: *default
    database: good_news_production
    username: good_news
    password: <%= ENV["GOOD_NEWS_DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    migrations_paths: db/cache_migrate
<% if dokku_cache_url %>
    url: <%= dokku_cache_url %>
<% else %>
    <<: *primary_production
    database: good_news_production_cache
<% end %>
  queue:
    <<: *default
    migrations_paths: db/queue_migrate
<% if dokku_queue_url %>
    url: <%= dokku_queue_url %>
<% else %>
    <<: *primary_production
    database: good_news_production_queue
<% end %>
  cable:
    <<: *default
    migrations_paths: db/cable_migrate
<% if dokku_cable_url %>
    url: <%= dokku_cable_url %>
<% else %>
    <<: *primary_production
    database: good_news_production_cable
<% end %>
